name: Meshery Docs CLI Reference Update

permissions:
  contents: write

on:
  push:
    branches:
      - "master"
    paths:
      - "mesheryctl/**"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"

jobs:
  mesheryctl_docs:
    if: "always() && github.event_name != 'pull_request' && github.repository == 'meshery/meshery' "
    runs-on: ubuntu-24.04
    steps:
      - name: Skip if needed
        run: |
          echo "this is it ${{ needs.SkipIfNeeded.outputs.skipdocupdate }} "
          if [ "${{github.event_name }}" == "push" ];then
            echo "version=edge" >> $GITHUB_ENV
          fi
          if [ "${{github.event_name }}" == "release" ];then
            echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: meshery/meshery
          token: ${{ secrets.GH_ACCESS_TOKEN }}
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
          check-latest: "true"
      - name: Remove current docs pages for mesheryctl
        run: |
          find docs/content/en/reference/mesheryctl -mindepth 1 ! -name '_index.md' -exec rm -rf {} +
      - name: Run script 📜
        run: |
          cd mesheryctl
          make docs

      - name: Pull changes from remote
        run: git pull origin master

      - name: Commit ✅
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          file_pattern: docs
          commit_user_name: l5io
          commit_user_email: ci@meshery.io
          commit_author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          commit_options: "--signoff"
          commit_message: "[Docs] Update Meshery Docs CLI Reference"
