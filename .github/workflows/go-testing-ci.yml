name: Golang Unit and Integration Tests

permissions:
  contents: read
on:
  push:
    branches:
      - "master"
    paths:
      - "**.go"
      - "**.golden"
      - ".github/workflows/go-testing-ci.yml"
      - ".github/.golangci.yml"
  pull_request:
    branches:
      - "master"
    paths:
      - "**.go"
      - "**.golden"
      - ".github/workflows/go-testing-ci.yml"
      - ".github/.golangci.yml"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"

jobs:
  golangci-server:
    strategy:
      matrix:
        go: [1.25]
        os: [ubuntu-24.04]
    name: golangci-lint-server
    if: github.repository == 'meshery/meshery'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.7
          args: --config=../.github/.golangci.yml --timeout=10m
          working-directory: ./server
  unit-tests-server:
    name: server Unit tests
    runs-on: ubuntu-24.04
    needs: golangci-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
      - name: Run coverage
        run: go test -json --short ./server/... -race -coverprofile=server-coverage.txt -covermode=atomic > server-test-output.json
      - name: Convert Go test results to Allure
        if: ${{ !cancelled() }}
        run: |
          ALLURE_OUTPUT_PATH=server-allure-results \
          ALLURE_LABELS="type=unit,env=ci" \
          node server/gotest-to-allure.js server-test-output.json

      - name: Checkout QA
        uses: actions/checkout@v6
        if: ${{ !cancelled() && github.event_name == 'push' }}
        with:
          repository: meshery/qa
          path: ./qa
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Sync results with qa
        if: ${{ !cancelled() && github.event_name == 'push' }}
        working-directory: qa
        run: make meshery-server-results-sync MESHERY_SERVER_RESULTS_PATH=../server-allure-results

      - name: Pull latest qa changes
        if: ${{ !cancelled() && github.event_name == 'push' }}
        working-directory: qa
        run: git pull --rebase --autostash origin master

      - name: Commit & push to qa
        if: ${{ !cancelled() && github.event_name == 'push' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "[Meshery] Sync Go Unit Test Results - ${GITHUB_SHA}"
          commit_options: "--signoff"
          repository: qa
          commit_user_name: meshery-ci
          commit_user_email: ci@meshery.io
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
  golangci-cli:
    strategy:
      matrix:
        go: [1.25]
        os: [ubuntu-24.04]
    name: golangci-lint-cli
    if: github.repository == 'meshery/meshery'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.7
          args: --config=../.github/.golangci.yml --timeout=10m
          working-directory: ./mesheryctl
  unit-tests-cli:
    name: mesheryctl Unit tests
    runs-on: ubuntu-24.04
    needs: golangci-cli
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Install lynx for xdg-open support
        run: sudo apt-get install lynx
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
      - name: Run mesheryctl coverage
        run: go test -json --short ./mesheryctl/... -race -coverprofile=mesheryctl-coverage.txt -covermode=atomic > mesheryctl-test-output.json
      - name: Convert Go test results to Allure
        if: ${{ !cancelled() }}
        run: |
          ALLURE_OUTPUT_PATH=mesheryctl-allure-results \
          ALLURE_LABELS="project=mesheryctl,type=unit,env=ci" \
          node server/gotest-to-allure.js mesheryctl-test-output.json

      - name: Checkout QA
        uses: actions/checkout@v6
        if: ${{ !cancelled() && github.event_name == 'push' }}
        with:
          repository: meshery/qa
          path: ./qa
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Sync results with qa
        if: ${{ !cancelled() && github.event_name == 'push' }}
        working-directory: qa
        run: make mesheryctl-results-sync MESHERYCTL_RESULTS_PATH=../mesheryctl-allure-results

      - name: Pull latest qa changes
        if: ${{ !cancelled() && github.event_name == 'push' }}
        working-directory: qa
        run: git pull --rebase --autostash origin master

      - name: Commit & push to qa
        if: ${{ !cancelled() && github.event_name == 'push' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "[Mesheryctl] Sync Go Unit Test Results - ${GITHUB_SHA}"
          commit_options: "--signoff"
          repository: qa
          commit_user_name: meshery-ci
          commit_user_email: ci@meshery.io
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
  build-mesheryctl:
    name: Build Meshery Binaries
    runs-on: ubuntu-24.04
    needs: 
      - golangci-cli
      - golangci-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Install lynx for xdg-open support
        run: sudo apt-get install lynx
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
      - name: Build Mesheryctl Binaries
        run: make
        working-directory: ./mesheryctl
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mesheryctl-binary
          path: ./mesheryctl/mesheryctl
          retention-days: 1
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    needs: build-mesheryctl
    strategy:
      fail-fast: false # ensure all matrix combinations run even if one fails
      matrix:
        platform: [docker, kubernetes]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Install lynx for xdg-open support
        run: sudo apt-get install lynx
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: mesheryctl-binary
          path: ./mesheryctl/
      - name: Verify Docker Details
        run: |
          docker version
          docker compose ps
        working-directory: ./install/docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@92086f6be054225fa813e0a4b13787fc9088faab # v1.13.0
        if: matrix.platform == 'kubernetes'
        with:
          cluster_name: "kind-cluster"
      - name: Run mesheryctl integration tests
        run: |
          chmod +x ./mesheryctl;
          ./mesheryctl system start -p ${{ matrix.platform }};
          ./mesheryctl system update -y;
          ./mesheryctl system status -y;
          ./mesheryctl system restart -y;
          ./mesheryctl system check --preflight;  
          ./mesheryctl system stop -y;
          echo "Running Mesheryctl with ${{ matrix.platform }} completed."
        working-directory: ./mesheryctl

