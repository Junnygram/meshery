name: Build Meshery UI

permissions:
  contents: read

on:
  workflow_call:
    outputs:
      ui-artifact:
        description: 'Name of the UI artifact'
        value: 'meshery-ui'
      provider-ui-artifact:
        description: 'Name of the Provider UI artifact'
        value: 'meshery-provider-ui'
    secrets: {}

jobs:
  ui-build:
    name: UI build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          check-latest: true
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          
      - name: Build UIs
        run: make ui-build
          
      - name: Upload meshery-ui artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: meshery-ui
          path: ui/out/
          
      - name: Upload provider-ui artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: meshery-provider-ui
          path: provider-ui/out/